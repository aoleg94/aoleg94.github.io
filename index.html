<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a1a1a">
<meta name="description" content="Small client-side web tools.">
<title>Tools</title>
<link rel="icon" href="/qr/icon.svg" type="image/svg+xml">
<!-- Share-target / legacy QR deep links land here (old installed PWAs posted
     to /?text=…&url=…, and /#text was the QR deep-link form). Forward those to
     /qr/, query and hash intact, before rendering the index. A bare visit to /
     has neither and falls through to the landing page below. -->
<script>
  if (location.search || location.hash) {
    location.replace('/qr/' + location.search + location.hash);
  }
</script>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.45 ui-sans-serif, system-ui, sans-serif;
    max-width: 36rem;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  h1 { font-size: 1.1rem; margin: 0 0 .25rem; letter-spacing: .05em; }
  .lede { color: #888; margin: 0 0 1.5rem; font-size: .85rem; }
  ul { list-style: none; margin: 0; padding: 0; }
  li { margin: 0 0 .9rem; }
  a.card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid #888; border-radius: 8px;
    padding: .7rem .9rem;
  }
  a.card:hover { background: rgba(128,128,128,.12); }
  .name { font-weight: 600; }
  .desc { color: #888; font-size: .85rem; margin-top: .15rem; }
  footer { color: #888; font-size: .75rem; margin-top: 2rem; text-align: center; }
  footer a { color: inherit; }
</style>
</head>
<body>
<h1>Tools</h1>
<p class="lede">Small things that run entirely in your browser.</p>
<ul>
  <li>
    <a class="card" href="/qr/">
      <div class="name">QR</div>
      <div class="desc">Turn text or a URL into a QR code. Installable as an Android share target.</div>
    </a>
  </li>
  <li>
    <a class="card" href="/decoder/">
      <div class="name">Decoder</div>
      <div class="desc">Decode error codes from OpenGL, Win32, COM, Vulkan, and HTTP.</div>
    </a>
  </li>
</ul>
<footer>
  All processing happens locally. View
  <a href="https://github.com/aoleg94/aoleg94.github.io">source</a>.
</footer>
</body>
</html>
